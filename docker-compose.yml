version: '3.8'

services:
  smartfarm:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartfarm-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DB_TYPE: sqlite
      DB_PATH: /app/data/smartfarm.db
      MQTT_BROKER_URL: ws://mqtt:9001
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      CORS_ORIGIN: https://yourdomain.com
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - mqtt
    networks:
      - smartfarm-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mqtt:
    image: eclipse-mosquitto:latest
    container_name: smartfarm-mqtt
    restart: always
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mqtt/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mqtt/data:/mosquitto/data
      - ./mqtt/log:/mosquitto/log
    networks:
      - smartfarm-network
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-h", "localhost", "-t", "$SYS/#", "-C", "1", "-i", "healthcheck", "-W", "2"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: smartfarm-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - smartfarm
    networks:
      - smartfarm-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  smartfarm-network:
    driver: bridge

volumes:
  mqtt-data:
  smartfarm-data:
